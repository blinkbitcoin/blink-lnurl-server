services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lnurl
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d lnurl"]
      interval: 5s
      timeout: 5s
      retries: 10

  otel-agent:
    image: otel/opentelemetry-collector-contrib:0.109.0
    restart: unless-stopped
    command: ["--config=/etc/otel-agent-config.yaml"]
    environment:
      HONEYCOMB_API_KEY: ${HONEYCOMB_API_KEY:-}
      HONEYCOMB_DATASET: ${HONEYCOMB_DATASET:-blink-lnurl-server-dev}
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./dev/otel-agent-config.yaml:/etc/otel-agent-config.yaml:ro

  lnurl-server:
    build: .
    environment:
      DEPLOYMENT_ENV: local
      LNURL_ADDRESS: 0.0.0.0:8080
      LNURL_AUTO_MIGRATE: "true"
      LNURL_DB_URL: postgres://user:password@postgres:5432/lnurl
      LNURL_DOMAINS: localhost:8080,127.0.0.1:8080
      LNURL_BLINK_GRAPHQL_ENDPOINT: ${LNURL_BLINK_GRAPHQL_ENDPOINT:-}
      LNURL_LOG_LEVEL: info
      LNURL_SCHEME: http
      LNURL_SSP_AUTH_SEED: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa
      LNURL_WEBHOOK_DOMAIN: localhost:8080
      OTEL_SERVICE_NAME: blink-lnurl-server-dev
      OTEL_TRACES_EXPORTER: otlp
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-agent:4317
    depends_on:
      postgres:
        condition: service_healthy
      otel-agent:
        condition: service_started
    ports:
      - "8080:8080"
