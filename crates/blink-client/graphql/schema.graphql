schema {
  query: Query
  mutation: Mutation
}

type Query {
  lnInvoicePaymentStatusByHash(input: LnInvoicePaymentStatusByHashInput!): LnInvoicePaymentStatus
}

type Mutation {
  lnInvoiceCreateOnBehalfOfRecipient(input: LnInvoiceCreateOnBehalfOfRecipientInput!): LnInvoicePayload!
  lnUsdInvoiceBtcDenominatedCreateOnBehalfOfRecipient(input: LnUsdInvoiceBtcDenominatedCreateOnBehalfOfRecipientInput!): LnInvoicePayload!
}

input LnInvoiceCreateOnBehalfOfRecipientInput {
  recipientWalletId: WalletId!
  amount: SatAmount!
  descriptionHash: String
  expiresIn: Minutes
  webhookUrl: EndpointUrl
}

input LnUsdInvoiceBtcDenominatedCreateOnBehalfOfRecipientInput {
  recipientWalletId: WalletId!
  amount: SatAmount!
  descriptionHash: String
  expiresIn: Minutes
  webhookUrl: EndpointUrl
}

input LnInvoicePaymentStatusByHashInput {
  paymentHash: PaymentHash!
}

type LnInvoicePayload {
  invoice: LnInvoice
  errors: [GraphQLError!]!
}

type LnInvoice {
  paymentRequest: String!
  paymentHash: PaymentHash!
}

type LnInvoicePaymentStatus {
  status: LnInvoicePaymentStatusType!
  paymentHash: PaymentHash!
  paymentRequest: String
  paymentPreimage: String
}

type GraphQLError {
  message: String!
}

enum LnInvoicePaymentStatusType {
  EXPIRED
  PAID
  PENDING
}

scalar WalletId
scalar SatAmount
scalar Minutes
scalar PaymentHash
scalar EndpointUrl
