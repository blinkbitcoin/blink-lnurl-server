receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  attributes/redact:
    actions:
      - key: preimage
        action: delete
      - key: payment_preimage
        action: delete
  batch: {}

exporters:
  debug:
    verbosity: detailed
  otlp/honeycomb:
    endpoint: api.honeycomb.io:443
    headers:
      x-honeycomb-team: ${HONEYCOMB_API_KEY}
      x-honeycomb-dataset: ${HONEYCOMB_DATASET}

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [attributes/redact, batch]
      exporters: [debug, otlp/honeycomb]
